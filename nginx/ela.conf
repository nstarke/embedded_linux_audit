# Example nginx reverse-proxy configuration for embedded_linux_audit
#
# Routing:
#   /terminal/<mac>  ->  api/terminal/server.js  (WebSocket, default port 8080)
#   /*               ->  api/agent/server.js      (Express,   default port 5000)
#
# The terminal path is an exact prefix match; everything else is passed to the
# agent API at its native web root, so no path stripping is needed.
#
# Both HTTP (port 80) and HTTPS (port 443) are served independently — plain
# HTTP is not redirected to HTTPS so that agents on networks without TLS can
# still connect.
#
# Installation:
#   cp nginx/ela.conf /etc/nginx/sites-available/ela
#   ln -s /etc/nginx/sites-available/ela /etc/nginx/sites-enabled/ela
#   nginx -t && systemctl reload nginx

upstream ela_agent {
    server 127.0.0.1:5000;
    keepalive 16;
}

upstream ela_terminal {
    server 127.0.0.1:8080;
    keepalive 16;
}

# --- HTTP (port 80) ---------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    # Add your server's IP address(es) here to accept requests by IP,
    # e.g.: server_name ela.example.com 192.168.1.100;
    server_name ela.example.com;

    # --- Common proxy settings ----------------------------------------------
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Authorization     $http_authorization;
    proxy_read_timeout  300s;

    # --- Terminal WebSocket: /terminal/<mac> --------------------------------
    location /terminal/ {
        proxy_pass http://ela_terminal;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Agent API: everything else -----------------------------------------
    location / {
        proxy_pass http://ela_agent;

        proxy_set_header Upgrade    "";
        proxy_set_header Connection "";

        client_max_body_size 200m;
    }
}

# --- HTTPS (port 443) -------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ela.example.com;

    # --- TLS ----------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/ela.example.com.crt;
    ssl_certificate_key /etc/ssl/private/ela.example.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # --- Common proxy settings ----------------------------------------------
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Authorization     $http_authorization;
    proxy_read_timeout  300s;

    # --- Terminal WebSocket: /terminal/<mac> --------------------------------
    location /terminal/ {
        proxy_pass http://ela_terminal;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Agent API: everything else -----------------------------------------
    location / {
        proxy_pass http://ela_agent;

        proxy_set_header Upgrade    "";
        proxy_set_header Connection "";

        client_max_body_size 200m;
    }
}
