# Example nginx reverse-proxy configuration for embedded_linux_audit
#
# Routing:
#   /terminal/<mac>  ->  api/terminal/server.js  (WebSocket, default port 8080)
#   /*               ->  api/agent/server.js      (Express,   default port 5000)
#
# The terminal path is an exact prefix match; everything else is passed to the
# agent API at its native web root, so no path stripping is needed.
#
# Both HTTP (port 80) and HTTPS (port 443) are served independently — plain
# HTTP is not redirected to HTTPS so that agents on networks without TLS can
# still connect.
#
# Installation:
#   sudo nginx/install.sh
#   (installs config, removes the Ubuntu default site, reloads nginx)

upstream ela_agent {
    server 127.0.0.1:5000;
    keepalive 16;
}

upstream ela_terminal {
    server 127.0.0.1:8080;
    keepalive 16;
}

upstream ela_gdb {
    server 127.0.0.1:9000;
    keepalive 16;
}

# --- HTTP (port 80) ---------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    # Replace ela.example.com with your hostname and/or IP address.
    # The install.sh script removes the Ubuntu default site so this becomes
    # the sole server for port 80 and handles IP-based requests as well.
    server_name ela.example.com _;

    # --- Terminal WebSocket: /terminal/<mac> --------------------------------
    # NOTE: nginx drops ALL inherited proxy_set_header when a location block
    # defines its own, so every header must be set explicitly here.
    location /terminal/ {
        proxy_pass         http://ela_terminal;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- GDB RSP bridge: /gdb/in|out/<32-hex-key> ---------------------------
    location /gdb/ {
        proxy_pass         http://ela_gdb;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Agent API: everything else -----------------------------------------
    location / {
        proxy_pass         http://ela_agent;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           "";
        proxy_set_header Connection        "";

        proxy_read_timeout  300s;
        client_max_body_size 200m;
    }
}

# --- HTTPS (port 443) -------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ela.example.com _;

    # --- TLS ----------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/ela.example.com.crt;
    ssl_certificate_key /etc/ssl/private/ela.example.com.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # --- Terminal WebSocket: /terminal/<mac> --------------------------------
    location /terminal/ {
        proxy_pass         http://ela_terminal;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- GDB RSP bridge: /gdb/in|out/<32-hex-key> ---------------------------
    location /gdb/ {
        proxy_pass         http://ela_gdb;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Agent API: everything else -----------------------------------------
    location / {
        proxy_pass         http://ela_agent;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header Upgrade           "";
        proxy_set_header Connection        "";

        proxy_read_timeout  300s;
        client_max_body_size 200m;
    }
}
