services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: embedded_linux_audit
      POSTGRES_USER: ela
      POSTGRES_PASSWORD: ela
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ela -d embedded_linux_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  agent-api:
    build:
      context: .
      dockerfile: api/agent/Dockerfile
    environment:
      NODE_ENV: production
      ELA_DB_HOST: postgres
      ELA_DB_PORT: 5432
      ELA_DB_NAME: embedded_linux_audit
      ELA_DB_USER: ela
      ELA_DB_PASSWORD: ela
      ELA_AGENT_HOST: 0.0.0.0
      ELA_AGENT_PORT: 5000
      ELA_AGENT_DATA_DIR: /var/lib/ela/data
      ELA_AGENT_SKIP_ASSET_SYNC: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agent-data:/var/lib/ela/data

  terminal-api:
    build:
      context: .
      dockerfile: api/terminal/Dockerfile
    environment:
      NODE_ENV: production
      ELA_DB_HOST: postgres
      ELA_DB_PORT: 5432
      ELA_DB_NAME: embedded_linux_audit
      ELA_DB_USER: ela
      ELA_DB_PASSWORD: ela
      ELA_TERMINAL_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - agent-api
      - terminal-api
    ports:
      - "80:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  agent-data:
