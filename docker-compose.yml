services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${ELA_REDIS_DATA_DIR:-/data/redis}:/data

  builder:
    build:
      context: .
      dockerfile: api/builder/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
      ELA_BUILD_REPO_ROOT: /src
    volumes:
      # Output: the per-user binaries land on the shared agent-data volume that
      # agent-api serves from.
      - ${ELA_DATA_DIR:-/data/agent}:/data/agent
      # Sources: the host repo (third_party, .git, Makefile, agent/, tests/...).
      # Read-write because the cross-compile writes build-* dirs under it.
      # Requires `git submodule update --init --recursive` on the host.
      - ${ELA_BUILD_SRC_DIR:-.}:/src
    depends_on:
      redis:
        condition: service_healthy

  agent-api:
    build:
      context: .
      dockerfile: api/agent/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
      ELA_AGENT_HOST: 0.0.0.0
      ELA_AGENT_PORT: 5000
      ELA_AGENT_DATA_DIR: /data/agent
      # For tools/add-user-key.js to enqueue builds.
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
    volumes:
      - ${ELA_DATA_DIR:-/data/agent}:/data/agent
    depends_on:
      redis:
        condition: service_healthy

  client-api:
    build:
      context: .
      dockerfile: api/client/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
      ELA_CLIENT_HOST: 0.0.0.0
      ELA_CLIENT_PORT: 7000

  terminal-api:
    build:
      context: .
      dockerfile: api/terminal/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
      ELA_TERMINAL_HOST: 0.0.0.0
      ELA_TERMINAL_PORT: 8080
      ELA_SOCKET_UID: ${ELA_SOCKET_UID:-}
    volumes:
      - ${ELA_TERMINAL_SOCKET_DIR:-/run/ela-terminal}:/run/ela-terminal

  gdb-api:
    build:
      context: .
      dockerfile: api/gdb/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_GDB_HOST: 0.0.0.0
      ELA_GDB_PORT: 9000

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - agent-api
      - client-api
      - terminal-api
      - gdb-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${ELA_NGINX_CONF_PATH:-./nginx/docker-tls.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${ELA_TLS_CERT:-./nginx/ssl/ela.crt}:/etc/nginx/ssl/ela.crt:ro
      - ${ELA_TLS_KEY:-./nginx/ssl/ela.key}:/etc/nginx/ssl/ela.key:ro

volumes: {}
