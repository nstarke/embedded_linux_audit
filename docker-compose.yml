services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: embedded_linux_audit
      POSTGRES_USER: ela
      POSTGRES_PASSWORD: ela
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ela -d embedded_linux_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${ELA_POSTGRES_DATA_DIR:-/data/postgres}:/var/lib/postgresql/data

  agent-api:
    build:
      context: .
      dockerfile: api/agent/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: postgres
      ELA_DB_PORT: 5432
      ELA_DB_NAME: embedded_linux_audit
      ELA_DB_USER: ela
      ELA_DB_PASSWORD: ela
      ELA_AGENT_HOST: 0.0.0.0
      ELA_AGENT_PORT: 5000
      ELA_AGENT_DATA_DIR: /data/agent
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${ELA_DATA_DIR:-/data/agent}:/data/agent

  terminal-api:
    build:
      context: .
      dockerfile: api/terminal/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: postgres
      ELA_DB_PORT: 5432
      ELA_DB_NAME: embedded_linux_audit
      ELA_DB_USER: ela
      ELA_DB_PASSWORD: ela
      ELA_TERMINAL_HOST: 0.0.0.0
      ELA_TERMINAL_PORT: 8080
      ELA_SOCKET_UID: ${ELA_SOCKET_UID:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${ELA_TERMINAL_SOCKET_DIR:-/run/ela-terminal}:/run/ela-terminal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - agent-api
      - terminal-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${ELA_NGINX_CONF_PATH:-./nginx/docker-tls.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${ELA_TLS_CERT:-./nginx/ssl/ela.crt}:/etc/nginx/ssl/ela.crt:ro
      - ${ELA_TLS_KEY:-./nginx/ssl/ela.key}:/etc/nginx/ssl/ela.key:ro

volumes: {}
