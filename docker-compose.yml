services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${ELA_REDIS_DATA_DIR:-/data/redis}:/data

  builder:
    build:
      context: .
      dockerfile: api/builder/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
      ELA_BUILD_REPO_ROOT: /src
      # Must match agent-api so the generic binaries land where the helper server
      # serves from and add-user-key assembles launchers (<data>/release_binaries).
      ELA_AGENT_DATA_DIR: /data/agent
      # Module-build status transitions are written straight to the DB (the
      # module_build_requests rows the client API polls).
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
    volumes:
      # Output: the one-time generic binaries land on the shared agent-data
      # volume that agent-api serves from and add-user-key wraps into launchers.
      # Kernel-module artifacts land there too (<data>/<mac>/modules/<id>/).
      - ${ELA_DATA_DIR:-/data/agent}:/data/agent
      # Sources: the host repo (third_party, .git, Makefile, agent/, tests/...).
      # Read-write because the cross-compile writes build-* dirs under it.
      # Requires `git submodule update --init --recursive` on the host.
      - ${ELA_BUILD_SRC_DIR:-.}:/src
      # Kernel source tarballs + prepared trees; survives container rebuilds so
      # repeat module builds skip download and modules_prepare.
      - ela-kmod-cache:/var/cache/ela-kmod
    depends_on:
      redis:
        condition: service_healthy

  agent-api:
    build:
      context: .
      dockerfile: api/agent/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
      ELA_AGENT_HOST: 0.0.0.0
      ELA_AGENT_PORT: 5000
      ELA_AGENT_DATA_DIR: /data/agent
      # For tools/add-user-key.js to enqueue builds.
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
      # Base terminal-API WS URL baked into per-user binaries so they auto-connect
      # on a bare run (e.g. wss://ela.example.com). Empty = do not embed.
      ELA_SERVER_URL: ${ELA_SERVER_URL:-}
    volumes:
      - ${ELA_DATA_DIR:-/data/agent}:/data/agent
    depends_on:
      redis:
        condition: service_healthy

  client-api:
    build:
      context: .
      dockerfile: api/client/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
      ELA_CLIENT_HOST: 0.0.0.0
      ELA_CLIENT_PORT: 7000
      # Enqueue operator commands to the terminal API and await results.
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
      # Must match the builder's mount: module-build job payloads carry artifact
      # paths under this root, which the builder resolves on its own volume.
      ELA_AGENT_DATA_DIR: /data/agent
      # Default agent-api origin embedded in module-deliver download commands.
      # Must be reachable FROM THE DEVICES (public origin), not docker-internal.
      ELA_MODULE_DOWNLOAD_BASE_URL: ${ELA_MODULE_DOWNLOAD_BASE_URL:-}
    depends_on:
      redis:
        condition: service_healthy

  terminal-api:
    build:
      context: .
      dockerfile: api/terminal/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_DB_HOST: ${ELA_DB_HOST:-postgres}
      ELA_DB_PORT: ${ELA_DB_PORT:-5432}
      ELA_DB_NAME: ${ELA_DB_NAME:-embedded_linux_audit}
      ELA_DB_USER: ${ELA_DB_USER:-ela}
      ELA_DB_PASSWORD: ${ELA_DB_PASSWORD:-ela}
      ELA_TERMINAL_HOST: 0.0.0.0
      ELA_TERMINAL_PORT: 8080
      ELA_SOCKET_UID: ${ELA_SOCKET_UID:-}
      # Consume operator commands enqueued by the client API.
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
    volumes:
      - ${ELA_TERMINAL_SOCKET_DIR:-/run/ela-terminal}:/run/ela-terminal
    depends_on:
      redis:
        condition: service_healthy

  gdb-api:
    build:
      context: .
      dockerfile: api/gdb/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ELA_GDB_HOST: 0.0.0.0
      ELA_GDB_PORT: 9000
      # Answers the client API's "list sessions" queries over the shared queue.
      REDIS_HOST: ${ELA_REDIS_HOST:-redis}
      REDIS_PORT: ${ELA_REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - agent-api
      - client-api
      - terminal-api
      - gdb-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${ELA_NGINX_CONF_PATH:-./nginx/docker-tls.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${ELA_TLS_CERT:-./nginx/ssl/ela.crt}:/etc/nginx/ssl/ela.crt:ro
      - ${ELA_TLS_KEY:-./nginx/ssl/ela.key}:/etc/nginx/ssl/ela.key:ro

volumes:
  ela-kmod-cache:
