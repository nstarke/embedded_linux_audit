name: npm audit

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 4 * * 1'   # weekly, Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-root:
    name: audit (root)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high

  audit-api-agent:
    name: audit (api/agent)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: api/agent

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: api/agent

  audit-api-terminal:
    name: audit (api/terminal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: api/terminal

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: api/terminal

  audit-api-gdb:
    name: audit (api/gdb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: api/gdb

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: api/gdb
