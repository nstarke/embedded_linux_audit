name: Coverity Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 1'   # weekly, Monday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverity:
    name: Coverity Scan (C/C++)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make autoconf automake cmake libtool-bin libltdl-dev

      - name: Coverity Scan
        uses: vapier/coverity-scan-action@v1
        with:
          project: nstarke/embedded_linux_audit
          token: ${{ secrets.COVERITY_SCAN_TOKEN }}
          email: ${{ secrets.COVERITY_SCAN_EMAIL }}
          build_language: cxx
          build_platform: linux64
          command: make
          cov_options: --exclude-file "third_party/.*"

  coverity-js:
    name: Coverity Scan (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lookup Coverity Build Tool hash
        id: coverity-cache-lookup
        run: |
          hash=$(curl https://scan.coverity.com/download/cxx/linux64 \
                   --data "token=${TOKEN}&project=nstarke%2Fembedded_linux_audit&md5=1")
          echo "hash=${hash}" >> $GITHUB_OUTPUT
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}

      - name: Cache Coverity Build Tool
        id: cov-build-cache
        uses: actions/cache@v4
        with:
          path: cov-analysis
          key: cov-build-cxx-linux64-${{ steps.coverity-cache-lookup.outputs.hash }}

      - name: Download Coverity Build Tool
        if: steps.cov-build-cache.outputs.cache-hit != 'true'
        run: |
          curl https://scan.coverity.com/download/cxx/linux64 \
            --no-progress-meter \
            --output cov-analysis.tar.gz \
            --data "token=${TOKEN}&project=nstarke%2Fembedded_linux_audit"
          mkdir -p cov-analysis
          tar -xzf cov-analysis.tar.gz --strip 1 -C cov-analysis
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}

      - name: Build with cov-build
        run: |
          export PATH="${PWD}/cov-analysis/bin:${PATH}"
          cov-build --no-command --dir cov-int --fs-capture-search api/

      - name: Submit results to Coverity Scan
        run: |
          tar -czvf cov-int.tgz cov-int
          curl \
            --form token="${TOKEN}" \
            --form email="${{ secrets.COVERITY_SCAN_EMAIL }}" \
            --form file=@cov-int.tgz \
            --form version="${{ github.sha }}" \
            --form description="coverity-scan-action ${{ github.repository }} / ${{ github.ref }}" \
            "https://scan.coverity.com/builds?project=nstarke%2Fembedded_linux_audit"
        env:
          TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
