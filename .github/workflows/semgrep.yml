name: Semgrep

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 2 * * 1'   # weekly, Monday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (JavaScript)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        run: semgrep scan --config p/javascript --config p/nodejs --config p/secrets --error api/
