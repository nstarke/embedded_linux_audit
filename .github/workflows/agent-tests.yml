name: Agent Tests

'on':
  workflow_run:
    workflows:
      - Release Cross Static Builds
    types:
      - completed
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-unit-c:
    name: tests/agent/unit-c
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Install C unit test dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Run native C unit tests
        run: |
          set -euo pipefail
          make test-unit-agent-c

  agent-c-coverage:
    name: coverage/agent-c
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Install native coverage dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y autoconf automake cmake libtool-bin libltdl-dev llvm lcov

      - name: Run native C coverage
        run: |
          set -euo pipefail
          make coverage-agent-c

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: generated/coverage/agent-c.lcov.info
          flags: agent-c
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  agent-api-jest:
    name: tests/api/agent/jest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS test dependencies
        run: |
          set -euo pipefail
          npm install

      - name: Run agent API Jest tests
        run: |
          set -euo pipefail
          node_modules/.bin/jest --runInBand --coverage tests/unit/api/agent tests/unit/api/lib

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: agent
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  terminal-api-jest:
    name: tests/api/terminal/jest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS test dependencies
        run: |
          set -euo pipefail
          npm install

      - name: Run terminal API Jest tests
        run: |
          set -euo pipefail
          node_modules/.bin/jest --runInBand --coverage tests/unit/api/terminal

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: terminal
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-release-binaries:
    name: build/release-binaries-${{ matrix.isa }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        isa:
          - arm32-le
          - arm32-be
          - aarch64-le
          - aarch64-be
          - mips-le
          - mips-be
          - mips64-le
          - mips64-be
          - powerpc-le
          - powerpc64-be
          - powerpc-be
          - x86
          - x86_64
          - riscv32
          - riscv64
    steps:
      - name: Skip local release build when using triggering workflow artifacts
        if: ${{ github.event_name == 'workflow_run' }}
        run: |
          set -euo pipefail
          echo "Using release binaries from triggering workflow artifacts."

      - name: Checkout
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive

      - name: Install local release build dependencies
        if: ${{ github.event_name != 'workflow_run' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y autoconf automake cmake libtool-bin libltdl-dev llvm

      - name: Build release binaries for agent tests
        if: ${{ github.event_name != 'workflow_run' }}
        run: |
          set -euo pipefail
          /bin/sh tests/compile_release_binaries_locally.sh --jobs="$(nproc)" "${{ matrix.isa }}"

      - name: Upload locally built release binaries
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/upload-artifact@v4
        with:
          name: ela-${{ matrix.isa }}
          path: api/data/release_binaries/${{ matrix.isa }}

  build-unit-test-binaries:
    name: build/unit-c-${{ matrix.name }}
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 16
      matrix:
        include:
          - name: arm32-le
            zig_targets: arm-linux-musleabi
          - name: arm32-be
            zig_targets: armeb-linux-musleabi,armeb-linux-gnueabi
          - name: aarch64-le
            zig_targets: aarch64-linux-musl
          - name: aarch64-be
            zig_targets: aarch64_be-linux-musl
          - name: mips-le
            zig_targets: mipsel-linux-musleabi,mipsel-linux-musleabihf
          - name: mips-be
            zig_targets: mips-linux-musleabi,mips-linux-musleabihf
          - name: mips64-le
            zig_targets: mips64el-linux-muslabi64,mips64el-linux-gnuabi64
          - name: mips64-be
            zig_targets: mips64-linux-muslabi64,mips64-linux-gnuabi64
          - name: powerpc-le
            zig_targets: powerpc64le-linux-musl,powerpc64le-linux-gnu
          - name: powerpc64-be
            zig_targets: powerpc64-linux-musl
          - name: powerpc-be
            zig_targets: powerpc-linux-musleabi,powerpc-linux-musleabihf,powerpc-linux-gnueabi,powerpc-linux-gnueabihf
          - name: x86
            zig_targets: x86-linux-musl
          - name: x86_64
            zig_targets: x86_64-linux-musl
          - name: riscv32
            zig_targets: riscv32-linux-musl,riscv32-linux-gnu
          - name: riscv64
            zig_targets: riscv64-linux-musl,riscv64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Install cross-build tooling for unit tests
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y cmake llvm xz-utils

      - name: Install Zig
        run: |
          set -euo pipefail
          ZIG_VERSION=0.14.0
          curl -fsSL -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$PWD/zig-linux-x86_64-${ZIG_VERSION}/zig" version

      - name: Build static C unit test binary
        run: |
          set -euo pipefail
          export CFLAGS=
          export CPPFLAGS=
          export CXXFLAGS=
          export LDFLAGS=
          mkdir -p dist/${{ matrix.name }}

          IFS=',' read -ra TARGETS <<< "${{ matrix.zig_targets }}"
          BUILT=0
          for T in "${TARGETS[@]}"; do
            echo "Trying unit-test target: ${T}"
            if make clean \
               && make build-unit-agent-c \
                    ELA_USE_READLINE=0 \
                    LDFLAGS=-static \
                    UNIT_TEST_CC="zig cc -target ${T}" \
                    UNIT_TEST_CFLAGS="-O2 -Wall -Wextra -std=c11 -D_DEFAULT_SOURCE" \
                    UNIT_TEST_LDFLAGS=-static \
                    CMAKE_C_COMPILER="$(command -v zig)" \
                    CMAKE_C_COMPILER_ARG1=cc \
                    CMAKE_C_COMPILER_TARGET="${T}" \
                    CC="zig cc -target ${T}"; then
              cp generated/agent_unit_tests "dist/${{ matrix.name }}/agent_unit_tests-${{ matrix.name }}"
              echo "Built unit-test binary successfully with target: ${T}"
              BUILT=1
              break
            fi
            echo "Unit-test target failed: ${T}"
          done

          if [ "$BUILT" -ne 1 ]; then
            echo "All candidate unit-test targets failed for ${{ matrix.name }}"
            exit 1
          fi

      - name: Upload unit test binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ela-unit-${{ matrix.name }}
          path: dist/${{ matrix.name }}/agent_unit_tests-${{ matrix.name }}

  shell-tests:
    name: tests/agent/shell
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: build-release-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Download x86_64 release artifact from triggering workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ela-x86_64
          path: downloaded-release-binaries

      - name: Download locally built release binaries
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: ela-x86_64
          path: downloaded-release-binaries

      - name: Stage native agent binary
        run: |
          set -euo pipefail
          binary_path="$(find downloaded-release-binaries -type f \( -name 'ela-x86_64' -o -name 'embedded_linux_audit-x86_64' \) | head -n 1)"
          if [ -z "$binary_path" ]; then
            echo "error: unable to locate x86_64 release artifact from triggering workflow" >&2
            exit 1
          fi

          install -m 755 "$binary_path" /tmp/embedded_linux_audit

      - name: Run shell tests
        env:
          BIN: /tmp/embedded_linux_audit
        run: |
          set -euo pipefail
          bash tests/agent/shell/test_all.sh

  script-tests:
    name: tests/agent/scripts
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: build-release-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Download x86_64 release artifact from triggering workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ela-x86_64
          path: downloaded-release-binaries

      - name: Download locally built release binaries
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: ela-x86_64
          path: downloaded-release-binaries

      - name: Stage native agent binary
        run: |
          set -euo pipefail
          binary_path="$(find downloaded-release-binaries -type f \( -name 'ela-x86_64' -o -name 'embedded_linux_audit-x86_64' \) | head -n 1)"
          if [ -z "$binary_path" ]; then
            echo "error: unable to locate x86_64 release artifact from triggering workflow" >&2
            exit 1
          fi

          install -m 755 "$binary_path" /tmp/embedded_linux_audit

      - name: Run script coverage files
        env:
          BIN: /tmp/embedded_linux_audit
        run: |
          set -euo pipefail
          if [ -f tests/agent/scripts/test_all.sh ]; then
            bash tests/agent/scripts/test_all.sh
            exit 0
          fi

          echo "warning: tests/agent/scripts/test_all.sh is not present at this ref; falling back to legacy inline script coverage loop"
          rc=0
          while IFS= read -r script; do
            echo
            echo "===== Running ${script#tests/agent/scripts/} ====="
            if /tmp/embedded_linux_audit --script "$script"; then
              script_rc=0
            else
              script_rc=$?
            fi

            if [ "$script_rc" -eq 2 ]; then
              echo "error: script parser/usage failure for $script"
              rc=1
            fi
          done < <(find tests/agent/scripts -type f -name '*.ela' | sort)
          exit "$rc"

  qemu-tests:
    name: tests/agent/qemu-${{ matrix.isa }}
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs:
      - build-release-binaries
      - build-unit-test-binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        isa:
          - arm32-le
          - arm32-be
          - aarch64-le
          - aarch64-be
          - mips-le
          - mips-be
          - mips64-le
          - mips64-be
          - powerpc-le
          - powerpc64-be
          - powerpc-be
          - x86
          - x86_64
          - riscv32
          - riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_run' && (github.event.workflow_run.head_branch || github.event.workflow_run.head_sha) || github.sha }}

      - name: Install qemu/runtime dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            bubblewrap \
            qemu-user-static \
            xz-utils

      - name: Download cross-build artifacts from triggering workflow
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: ela-${{ matrix.isa }}
          path: downloaded-release-binaries

      - name: Download locally built release binaries
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: ela-${{ matrix.isa }}
          path: downloaded-release-binaries

      - name: Download locally built unit test binary
        uses: actions/download-artifact@v4
        with:
          name: ela-unit-${{ matrix.isa }}
          path: downloaded-unit-tests

      - name: Stage downloaded release binary for qemu tests
        run: |
          set -euo pipefail
          rm -rf api/data/release_binaries
          dest_dir="api/data/release_binaries/${{ matrix.isa }}"
          mkdir -p "$dest_dir"

          find downloaded-release-binaries -type f \( -name 'ela-*' -o -name 'embedded_linux_audit-*' \) | while IFS= read -r binary; do
            binary_name="$(basename "$binary")"
            case "$binary_name" in
              embedded_linux_audit-*)
                binary_name="ela-${binary_name#embedded_linux_audit-}"
                ;;
            esac

            install -m 755 "$binary" "$dest_dir/$binary_name"
          done

      - name: Stage unit test binary for qemu tests
        run: |
          set -euo pipefail
          unit_bin="$(find downloaded-unit-tests -type f -name 'agent_unit_tests-*' | head -n 1)"
          if [ -z "$unit_bin" ]; then
            echo "error: unable to locate unit test artifact for ${{ matrix.isa }}" >&2
            exit 1
          fi

          install -m 755 "$unit_bin" "/tmp/agent_unit_tests-${{ matrix.isa }}"

      - name: Run qemu ISA test
        env:
          ELA_QEMU_RUN_AS_ROOT: 1
          ELA_QEMU_REQUIRE_RELEASE_BINARIES: ${{ github.event_name == 'workflow_run' && '1' || '0' }}
          ELA_QEMU_UNIT_TEST_BIN: /tmp/agent_unit_tests-${{ matrix.isa }}
        run: |
          set -euo pipefail
          mkdir -p qemu-logs
          log_path="qemu-logs/${{ matrix.isa }}.log"
          /bin/sh "tests/agent/qemu/${{ matrix.isa }}.sh" 2>&1 | tee "$log_path"
          test_rc=${PIPESTATUS[0]}
          exit "$test_rc"

      - name: Upload qemu ISA log
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: qemu-log-${{ matrix.isa }}
          path: qemu-logs/${{ matrix.isa }}.log

  qemu-summary:
    name: tests/agent/qemu-summary
    if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    needs: qemu-tests
    runs-on: ubuntu-latest
    steps:
      - name: Download qemu ISA logs
        uses: actions/download-artifact@v4
        with:
          pattern: qemu-log-*
          path: qemu-logs

      - name: Write QEMU summary
        run: |
          set -euo pipefail
          {
            echo "## QEMU Test Summary"
            echo
            echo "Overall matrix result: \`${{ needs.qemu-tests.result }}\`"
            echo
            echo "Per-ISA jobs:"
            echo "- tests/agent/qemu-arm32-le"
            echo "- tests/agent/qemu-arm32-be"
            echo "- tests/agent/qemu-aarch64-le"
            echo "- tests/agent/qemu-aarch64-be"
            echo "- tests/agent/qemu-mips-le"
            echo "- tests/agent/qemu-mips-be"
            echo "- tests/agent/qemu-mips64-le"
            echo "- tests/agent/qemu-mips64-be"
            echo "- tests/agent/qemu-powerpc-le"
            echo "- tests/agent/qemu-powerpc64-be"
            echo "- tests/agent/qemu-powerpc-be"
            echo "- tests/agent/qemu-x86"
            echo "- tests/agent/qemu-x86_64"
            echo "- tests/agent/qemu-riscv32"
            echo "- tests/agent/qemu-riscv64"
            echo
            echo "Grouped log excerpts:"
          } >> "$GITHUB_STEP_SUMMARY"

          for isa in \
            arm32-le arm32-be aarch64-le aarch64-be \
            mips-le mips-be mips64-le mips64-be \
            powerpc-le powerpc64-be powerpc-be x86 x86_64 riscv32 riscv64
          do
            log_path="$(find qemu-logs -type f -name "${isa}.log" | head -n 1)"
            {
              echo
              echo "### ${isa}"
              if [ -n "$log_path" ] && [ -f "$log_path" ]; then
                pass_count="$(grep -c '^\[PASS\]' "$log_path" 2>/dev/null || true)"
                fail_count="$(grep -c '^\[FAIL\]' "$log_path" 2>/dev/null || true)"
                echo
                echo "- Pass lines: ${pass_count}"
                echo "- Fail lines: ${fail_count}"
                echo
                echo '```text'
                sed -n '1,120p' "$log_path"
                echo '```'
              else
                echo
                echo "_Log artifact missing for ${isa}._"
              fi
            } >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo
            echo "Full per-ISA logs are attached as workflow artifacts named \`qemu-log-<isa>\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail summary job when any QEMU matrix job failed
        if: ${{ needs.qemu-tests.result != 'success' }}
        run: |
          echo "One or more QEMU ISA jobs failed." >&2
          exit 1

  prepare-release-publish-artifacts:
    name: prepare/release-publish-artifacts
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'release' }}
    needs:
      - shell-tests
      - script-tests
      - qemu-tests
      - qemu-summary
    runs-on: ubuntu-latest
    steps:
      - name: Download cross-build artifacts from triggering workflow
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: ela-*
          path: release-assets

      - name: Download release metadata from triggering workflow
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          name: release-metadata
          path: release-metadata

      - name: Upload publishable release assets
        uses: actions/upload-artifact@v4
        with:
          name: publish-release-assets
          path: release-assets

      - name: Upload publishable release metadata
        uses: actions/upload-artifact@v4
        with:
          name: publish-release-metadata
          path: release-metadata/tag.txt
