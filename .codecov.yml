ignore:
  - "tests/unit/agent"
  # These files require a loaded target-kernel module and physical hardware.
  # Their argument/dispatch paths are covered by shell tests, while the pure
  # parsing and selection logic remains in the measured *_util.c files.
  - "kmod/**"
  - "agent/spi/spi_cmd.c"
  - "agent/nand/nand_cmd.c"
  - "agent/emmc/emmc_cmd.c"
  - "agent/orom/orom_kmod_cmd.c"
  - "agent/usb/usb_cmd.c"

coverage:
  status:
    project:
      default:
        # Allow up to 15% drop to accommodate coverage measurement expansions
        # (e.g. when new source files are added to the coverage report).
        threshold: 15%
        informational: true
    patch:
      default:
        target: 50%
